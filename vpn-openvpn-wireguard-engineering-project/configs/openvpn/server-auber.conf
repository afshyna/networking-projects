#########################################
## CONFIGURATION SERVEUR OPENVPN
## SERVEUR AUBERVILLIERS --> TOKYO/NY
#########################################

dev tun
port 1195
proto udp

# Réseau VPN
server 10.9.2.0 255.255.255.0

# Evite l'utilisation de la topologie net30 (devenue obsolète)
topology subnet

# Communication inter-clients VPN
client-to-client

# Activé pour lire le iroute de Tokyo & NY
client-config-dir /etc/openvpn/ccd

# Logging
verb 3
log vpn-srv-auber.log

# Maintien de connexion
keepalive 5 30

#################
## SECURITE
#################

# TLS / certificats
tls-server
ca /etc/openvpn/tls/cacert.pem
cert /etc/openvpn/tls/server-auber.crt
key /etc/openvpn/tls/server-auber.key
dh /etc/openvpn/tls/dh2048.pem

# chiffrements autorisés pour la négociation 
data-ciphers AES-256-GCM:AES-128-GCM 

#  chiffrement par défaut (pour la compatibilité) 
cipher AES-256-GCM 

###################
## ROUTES (OPENVPN) 
###################

# Route pour atteindre le tunnel VPN principal  (passe par la passerelle vers Paris-Montrouge)
route 10.9.1.0 255.255.255.0 192.168.100.200	
	
# Route principale vers le réseau LAN des clients VPN (choisie lorsque le VPN principal est UP)
route 172.20.10.0 255.255.255.240 192.168.100.200	
			
# Routes ajoutées aux clients VPN, qui passent via le tunnel IP de secours
push "route 192.168.1.0 255.255.255.0"
push "route 192.168.100.0 255.255.255.0"

#####################
## ROUTES (WIREGUARD)
#####################
push "route 10.9.3.0 255.255.255.0"

route 10.9.3.0 255.255.255.0 192.168.100.200 5

