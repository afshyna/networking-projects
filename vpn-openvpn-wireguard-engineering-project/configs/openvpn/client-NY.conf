################
# NY CLIENT OPENVPN  CONFIGURATION
################ 

client
dev tun
proto udp

# Connection to Primary VPN server (Paris-Montrouge)
remote 82.X.Y.Z 1194
# Connection to Backup VPN server (Paris-Montrouge)
remote 82.X.Y.Z 1195

# Logging
verb 3
log vpn-client-NY.log

################
# SECURITY
################ 

# TLS / certificates
tls-client
ca /etc/openvpn/tls/cacert.pem
cert /etc/openvpn/tls/client-NY.crt
key /etc/openvpn/tls/client-NY.key
auth SHA512

# Permitted ciphers for the TLS handshake
data-ciphers AES-256-GCM:AES-128-GCM
cipher AES-256-GCM

################
# RECONNEXION 
# STRATEGY 
#################

# Never give up on finding the server
resolv-retry infinite 	

# Avoid binding to a local port
nobind

# Maitain the connection for a rapid fault detection
keepalive 5 30
